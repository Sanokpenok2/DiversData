<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Выбор точки на карте</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100%; height: calc(100vh - 130px); }
    .panel {
      padding: 12px 16px;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      border-top: 1px solid #ddd;
    }
    .coords { font-size: 14px; margin-bottom: 10px; color: #666; }
    .coords.error { color: #c0392b; }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 13px; color: #888; margin-bottom: 4px; }
    .region { font-size: 12px; color: #aaa; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <p class="hint">Нажмите на карту, чтобы выбрать точку обнаружения устриц</p>
    <p class="region">Доступный регион: Крым, Чёрное и Азовское моря</p>
    <p class="coords" id="coords">Точка не выбрана</p>
    <button class="btn" id="confirm" disabled>Подтвердить точку</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const REGION = {
      minLon: 30.5,
      minLat: 42.5,
      maxLon: 41.5,
      maxLat: 47.8
    };

    const regionExtent = ol.proj.transformExtent(
      [REGION.minLon, REGION.minLat, REGION.maxLon, REGION.maxLat],
      'EPSG:4326',
      'EPSG:3857'
    );

    let selectedLat = null;
    let selectedLng = null;

    const markerSource = new ol.source.Vector();
    const markerLayer = new ol.layer.Vector({
      source: markerSource,
      style: new ol.style.Style({
        image: new ol.style.Circle({
          radius: 9,
          fill: new ol.style.Fill({ color: '#e74c3c' }),
          stroke: new ol.style.Stroke({ color: '#ffffff', width: 2.5 })
        })
      })
    });

    const map = new ol.Map({
      target: 'map',
      layers: [
        new ol.layer.Tile({
          source: new ol.source.XYZ({
            url: 'https://{a-d}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            attributions: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>'
          })
        }),
        markerLayer
      ],
      view: new ol.View({
        center: ol.proj.fromLonLat([34.1, 45.0]),
        zoom: 7,
        minZoom: 6,
        maxZoom: 16,
        extent: regionExtent
      })
    });

    map.getView().fit(regionExtent, { padding: [20, 20, 20, 20] });

    const coordsEl = document.getElementById('coords');
    const confirmBtn = document.getElementById('confirm');

    function isInRegion(lon, lat) {
      return lon >= REGION.minLon && lon <= REGION.maxLon &&
             lat >= REGION.minLat && lat <= REGION.maxLat;
    }

    function setMarker(lon, lat) {
      markerSource.clear();
      markerSource.addFeature(new ol.Feature({
        geometry: new ol.geom.Point(ol.proj.fromLonLat([lon, lat]))
      }));
    }

    function showError(message) {
      coordsEl.textContent = message;
      coordsEl.classList.add('error');
      confirmBtn.disabled = true;
      selectedLat = null;
      selectedLng = null;
      markerSource.clear();
    }

    function showSelection(lon, lat) {
      selectedLat = lat;
      selectedLng = lon;
      setMarker(lon, lat);
      coordsEl.textContent = 'Широта: ' + lat.toFixed(6) + ', Долгота: ' + lon.toFixed(6);
      coordsEl.classList.remove('error');
      confirmBtn.disabled = false;
    }

    map.on('click', function(evt) {
      const [lon, lat] = ol.proj.toLonLat(evt.coordinate);

      if (!isInRegion(lon, lat)) {
        showError('Точка вне допустимой области. Выберите место в окрестностях Крыма, Чёрного или Азовского моря.');
        return;
      }

      showSelection(lon, lat);
    });

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        if (isInRegion(lon, lat)) {
          map.getView().animate({
            center: ol.proj.fromLonLat([lon, lat]),
            zoom: 10,
            duration: 600
          });
        }
      });
    }

    confirmBtn.addEventListener('click', function() {
      if (selectedLat === null || selectedLng === null) return;

      tg.sendData(JSON.stringify({
        lat: selectedLat,
        lng: selectedLng
      }));
    });
  </script>
</body>
</html>
