<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Выбор точки на карте</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@9.2.4/ol.css">
  <script src="https://cdn.jsdelivr.net/npm/ol@9.2.4/dist/ol.js"></script>
  <script src="https://cdn.max.ru/max-web-app/max-web-app.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #map { width: 100%; height: calc(100vh - 180px); }
    .panel {
      padding: 12px 16px;
      background: var(--max-theme-bg-color, #fff);
      color: var(--max-theme-text-color, #000);
      border-top: 1px solid #ddd;
    }
    .coords { font-size: 14px; margin-bottom: 10px; color: #666; word-break: break-word; }
    .coords.error { color: #c0392b; }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      background: var(--max-theme-button-color, #2481cc);
      color: var(--max-theme-button-text-color, #fff);
      margin-bottom: 8px;
    }
    .btn.secondary {
      background: #eef3f8;
      color: #1a5276;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 13px; color: #888; margin-bottom: 4px; }
    .region { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .browser-note {
      font-size: 12px;
      color: #555;
      background: #fff8e1;
      border: 1px solid #ffe082;
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="panel">
    <p class="hint">Нажмите на карту, чтобы выбрать точку обнаружения устриц</p>
    <p class="region">Доступный регион: Крым, Чёрное и Азовское моря</p>
    <p id="browserNote" class="browser-note hidden">
      Режим браузера: скопируйте координаты и отправьте их боту сообщением (шаг «Координаты»).
    </p>
    <p class="coords" id="coords">Точка не выбрана</p>
    <button class="btn" id="confirm" disabled>Подтвердить точку</button>
    <button class="btn secondary hidden" id="copy" disabled>Скопировать координаты</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const forceBrowser = params.get('browser') === '1';
    const webApp = window.WebApp;
    const inMessenger = !!(webApp && webApp.initData && !forceBrowser);
    const browserMode = !inMessenger;

    if (inMessenger) {
      if (typeof webApp.ready === 'function') webApp.ready();
      if (typeof webApp.expand === 'function') webApp.expand();
    } else {
      document.getElementById('browserNote').classList.remove('hidden');
      document.getElementById('copy').classList.remove('hidden');
      document.getElementById('confirm').classList.add('hidden');
    }

    const REGION = {
      minLon: 30.5,
      minLat: 42.5,
      maxLon: 41.5,
      maxLat: 47.8
    };

    const regionExtent = ol.proj.transformExtent(
      [REGION.minLon, REGION.minLat, REGION.maxLon, REGION.maxLat],
      'EPSG:4326',
      'EPSG:3857'
    );

    let selectedLat = null;
    let selectedLng = null;

    const markerSource = new ol.source.Vector();
    const markerLayer = new ol.layer.Vector({
      source: markerSource,
      style: new ol.style.Style({
        image: new ol.style.Circle({
          radius: 9,
          fill: new ol.style.Fill({ color: '#e74c3c' }),
          stroke: new ol.style.Stroke({ color: '#ffffff', width: 2.5 })
        })
      })
    });

    const map = new ol.Map({
      target: 'map',
      layers: [
        new ol.layer.Tile({
          source: new ol.source.XYZ({
            url: 'https://{a-d}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
            attributions: '&copy; OpenStreetMap &copy; CARTO'
          })
        }),
        markerLayer
      ],
      view: new ol.View({
        center: ol.proj.fromLonLat([34.1, 45.0]),
        zoom: 7,
        minZoom: 6,
        maxZoom: 16,
        extent: regionExtent
      })
    });

    map.getView().fit(regionExtent, { padding: [20, 20, 20, 20] });

    const coordsEl = document.getElementById('coords');
    const confirmBtn = document.getElementById('confirm');
    const copyBtn = document.getElementById('copy');

    function isInRegion(lon, lat) {
      return lon >= REGION.minLon && lon <= REGION.maxLon &&
             lat >= REGION.minLat && lat <= REGION.maxLat;
    }

    function coordsText() {
      return selectedLat.toFixed(6) + ', ' + selectedLng.toFixed(6);
    }

    function setMarker(lon, lat) {
      markerSource.clear();
      markerSource.addFeature(new ol.Feature({
        geometry: new ol.geom.Point(ol.proj.fromLonLat([lon, lat]))
      }));
    }

    function showError(message) {
      coordsEl.textContent = message;
      coordsEl.classList.add('error');
      confirmBtn.disabled = true;
      copyBtn.disabled = true;
      selectedLat = null;
      selectedLng = null;
      markerSource.clear();
    }

    function showSelection(lon, lat) {
      selectedLat = lat;
      selectedLng = lon;
      setMarker(lon, lat);
      coordsEl.textContent = 'Широта: ' + lat.toFixed(6) + ', Долгота: ' + lon.toFixed(6);
      coordsEl.classList.remove('error');
      confirmBtn.disabled = false;
      copyBtn.disabled = false;
    }

    map.on('click', function(evt) {
      const [lon, lat] = ol.proj.toLonLat(evt.coordinate);

      if (!isInRegion(lon, lat)) {
        showError('Точка вне допустимой области. Выберите место в окрестностях Крыма, Чёрного или Азовского моря.');
        return;
      }

      showSelection(lon, lat);
    });

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(function(pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        if (isInRegion(lon, lat)) {
          map.getView().animate({
            center: ol.proj.fromLonLat([lon, lat]),
            zoom: 10,
            duration: 600
          });
        }
      });
    }

    confirmBtn.addEventListener('click', function() {
      if (selectedLat === null || selectedLng === null || !inMessenger) return;

      const payload = JSON.stringify({ lat: selectedLat, lng: selectedLng });
      if (typeof webApp.sendData === 'function') {
        webApp.sendData(payload);
      } else if (typeof webApp.close === 'function') {
        webApp.close(payload);
      }
    });

    copyBtn.addEventListener('click', async function() {
      if (selectedLat === null || selectedLng === null) return;

      const text = coordsText();
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = 'Скопировано! Вставьте в бота';
      } catch (e) {
        copyBtn.textContent = text;
      }
    });
  </script>
</body>
</html>
